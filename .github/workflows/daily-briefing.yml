name: Daily AI Research Briefing

on:
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "How many recent hours to fetch"
        required: false
        default: "48"
      only:
        description: "Comma-separated sources to run: rss,github,reddit,twitter,web,trending"
        required: false
        default: "rss,github,reddit"
      dry_run:
        description: "Render digest without sending PushPlus"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      HOURS: ${{ github.event.inputs.hours || '48' }}
      ONLY: ${{ github.event.inputs.only || 'rss,github,reddit' }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: Checkout scheduler repo
        uses: actions/checkout@v4

      - name: Checkout tech-news-digest
        uses: actions/checkout@v4
        with:
          repository: draco-agent/tech-news-digest
          path: tech-news-digest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tech-news-digest dependencies
        working-directory: tech-news-digest
        run: python -m pip install -r requirements.txt

      - name: Prepare output directories
        run: |
          mkdir -p artifacts workspace/archive/tech-news-digest

      - name: Run tech-news-digest pipeline
        working-directory: tech-news-digest
        run: |
          python scripts/run-pipeline.py \
            --defaults config/defaults \
            --hours "$HOURS" \
            --only "$ONLY" \
            --archive-dir ../workspace/archive/tech-news-digest \
            --output ../artifacts/td-merged.json \
            --debug \
            --force \
            --verbose

      - name: Render and send PushPlus briefing
        run: |
          args=(
            --input artifacts/td-merged.json
            --meta artifacts/td-merged.meta.json
            --output artifacts/pushplus-digest.md
            --title "AI Research Daily Briefing"
          )
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/pushplus_digest.py "${args[@]}"

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-research-briefing
          path: |
            artifacts/
          if-no-files-found: warn
