name: AI 研究每日简报

on:
  schedule:
    # 01:00 UTC = 北京时间 09:00。
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      hours:
        description: "抓取最近多少小时"
        required: false
        default: "48"
      only:
        description: "要运行的来源类型，用英文逗号分隔：rss,github-releases,twitter,web,trending"
        required: false
        default: "rss,github-releases"
      dry_run:
        description: "只生成结果，不发送 PushPlus"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      HOURS: ${{ github.event.inputs.hours || '48' }}
      ONLY: ${{ github.event.inputs.only || 'rss,github-releases' }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}

    steps:
      - name: 检出调度仓库
        uses: actions/checkout@v4

      - name: 检出 tech-news-digest
        uses: actions/checkout@v4
        with:
          repository: draco-agent/tech-news-digest
          path: tech-news-digest

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 tech-news-digest 依赖
        working-directory: tech-news-digest
        run: python -m pip install -r requirements.txt

      - name: 准备输出目录
        run: |
          mkdir -p artifacts workspace/config workspace/archive/tech-news-digest

      - name: 生成 jxtse 精选来源配置
        run: |
          python scripts/build_briefing_config.py \
            --source-md examples/briefing-source-set.md \
            --defaults tech-news-digest/config/defaults/sources.json \
            --output-dir workspace/config
          cp workspace/config/tech-news-digest-sources.json artifacts/tech-news-digest-sources.json

      - name: 运行 tech-news-digest 流水线
        working-directory: tech-news-digest
        run: |
          SKIP_STEPS=()

          if [[ ",$ONLY," != *",rss,"* ]]; then
            SKIP_STEPS+=(rss)
          fi
          if [[ ",$ONLY," != *",github-releases,"* && ",$ONLY," != *",github,"* ]]; then
            SKIP_STEPS+=(github)
          fi
          if [[ ",$ONLY," != *",trending,"* ]]; then
            SKIP_STEPS+=("github trending")
          fi
          if [[ ",$ONLY," != *",twitter,"* ]]; then
            SKIP_STEPS+=(twitter)
          fi
          if [[ ",$ONLY," != *",reddit,"* ]]; then
            SKIP_STEPS+=(reddit)
          fi
          if [[ ",$ONLY," != *",web,"* ]]; then
            SKIP_STEPS+=(web)
          fi

          SKIP_ARG="$(IFS=,; echo "${SKIP_STEPS[*]}")"

          python scripts/run-pipeline.py \
            --defaults config/defaults \
            --config ../workspace/config \
            --hours "$HOURS" \
            --skip "$SKIP_ARG" \
            --archive-dir ../workspace/archive/tech-news-digest \
            --output ../artifacts/td-merged.json \
            --debug \
            --force \
            --verbose

      - name: 渲染并发送 PushPlus 简报
        run: |
          args=(
            --input artifacts/td-merged.json
            --meta artifacts/td-merged.meta.json
            --output artifacts/pushplus-digest.md
            --title "AI 研究每日简报"
          )
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/pushplus_digest.py "${args[@]}"

      - name: 上传执行结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-research-briefing
          path: |
            artifacts/
          if-no-files-found: warn
